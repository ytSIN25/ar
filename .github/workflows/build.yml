name: Build Kivy Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # Added libtool, autoconf, and automake explicitly
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev automake
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: Build with Buildozer
        env:
          # This variable explicitly tells Buildozer to auto-accept licenses
          ANDROIDSDK_ACCEPT: "1"
        run: |
          # Ensure the directory exists
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Force buildozer to run and accept licenses
          # We use a loop here just in case it prompts for multiple items
          yes | buildozer android debug

      - name: Force SDK Install
        run: |
          # Manually install the build tools and accept the license
          # This directory structure is where Buildozer expects it
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --sdk_root=$ANDROID_HOME "build-tools;34.0.0" "platforms;android-33"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk