name: Build Kivy Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # Use libtinfo6 instead of libtinfo5 for Ubuntu 24.04
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          
          # Install Buildozer and necessary build tools
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython virtualenv

      - name: Build with Buildozer
        run: |
          # Create a directory to hold accepted licenses
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Force acceptance of licenses using yes
          yes | sdkmanager --licenses || true
          
          # Run the build
          buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk