name: Build Kivy Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          # Use libtinfo6 instead of libtinfo5 for Ubuntu 24.04
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev
          
          # Install Buildozer and necessary build tools
          pip3 install --user --upgrade buildozer
          pip3 install --user --upgrade cython virtualenv

      - name: Build with Buildozer
        env:
          # This tells buildozer to accept licenses automatically
          BUILDOZER_BUILD_ANDROID_SDK_ACCEPTANCE: "1"
        run: |
          # 1. Create directory for licenses
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # 2. Force acceptance of all licenses. 
          # The 'yes' command pipes 'y' to every prompt.
          # We use '|| true' to prevent the pipeline from crashing 
          # if the licenses are already accepted.
          yes | sdkmanager --licenses || true
          
          # 3. Build the APK
          buildozer android debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk